# SBR Violation Tracker — Monthly Board Report
# Runs on the 1st of every month at 7:00 AM Arizona time (MST = UTC-7)

name: Monthly Board Report

on:
  schedule:
    - cron: '0 14 1 * *'   # 7:00 AM MST on the 1st of each month
  workflow_dispatch:         # Manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install supabase python-dateutil

      - name: Send monthly reports
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_FROM:           ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          CRYSTAL_EMAIL:        ${{ secrets.CRYSTAL_EMAIL }}
          BOARD_EMAIL:          ${{ secrets.BOARD_EMAIL }}
        run: python backend/monthly_report.py
